{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Sign AI</title>
  <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Traffic Sign Recognition</h1>
      <p>Train with your own photos and detect sign meaning instantly.</p>
      <nav>
        <a href="{% url 'train' %}">Training</a>
        <a href="{% url 'detect' %}">Detection</a>
        <a href="/admin/">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="notice">{{ message }}</div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
